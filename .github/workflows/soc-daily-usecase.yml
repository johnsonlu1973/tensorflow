name: "SOC Strategy: Daily Use Case Report"
on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: read

env:
  BRANCH_NAME: master
  PAGES_BASE: https://johnsonlu1973.github.io/tensorflow

jobs:
  daily-usecase:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: soc-agent/agent/requirements.txt

      - name: Install dependencies
        run: pip install -r soc-agent/agent/requirements.txt

      - name: Process user feedback (learn from GitHub Issues)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: cd soc-agent && python agent/main.py --task feedback

      - name: Generate Use Case Report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REPORT_BASE_URL: ${{ env.PAGES_BASE }}/reports
        run: cd soc-agent && python agent/main.py --task usecase

      - name: Commit and push
        run: |
          git config user.name "SOC Strategy Agent"
          git config user.email "soc-agent@users.noreply.github.com"
          git add soc-agent/reports/ soc-agent/skills/ soc-agent/data/ || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "feat(reports): use case & pain points $(date -u +'%Y-%m-%d')"
          git pull --rebase origin ${{ env.BRANCH_NAME }}
          git push origin ${{ env.BRANCH_NAME }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./soc-agent/reports
          destination_dir: reports
          keep_files: true
