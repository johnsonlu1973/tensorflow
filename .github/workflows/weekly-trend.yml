name: SOC Planning — Weekly Trend Analysis

on:
  schedule:
    # ── 每週一台灣時間 06:00 執行趨勢分析 ──
    # Taiwan Monday 06:00 = UTC Sunday 22:00
    - cron: '0 22 * * 0'
  workflow_dispatch:
    inputs:
      trend_days:
        description: 'Number of days to look back (default: 7)'
        required: false
        default: '7'

jobs:
  trend:
    name: Weekly Trend Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: soc_planning_agent/requirements.txt

      - name: Install dependencies
        run: pip install anthropic>=0.40.0

      - name: Run trend analysis
        id: run_trend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TREND_DAYS: ${{ github.event.inputs.trend_days || '7' }}
        run: |
          cd $GITHUB_WORKSPACE
          python soc_planning_agent/trend_analyzer.py

      - name: Commit trend report
        run: |
          git config user.name  "SOC Planning Agent"
          git config user.email "soc-agent@github-actions[bot]"
          git add docs/
          git diff --staged --quiet || git commit -m \
            "trend: weekly analysis $(date -u +%Y-%m-%d) (${{ steps.run_trend.outputs.trend_articles }} articles)"
          git push || true

      - name: Summary
        run: |
          echo "### Weekly Trend Analysis" >> $GITHUB_STEP_SUMMARY
          echo "📈 **Articles analyzed:** ${{ steps.run_trend.outputs.trend_articles }}" >> $GITHUB_STEP_SUMMARY
          echo "📅 **Date:** ${{ steps.run_trend.outputs.today }}" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Pages:** ${{ steps.run_trend.outputs.pages_url }}" >> $GITHUB_STEP_SUMMARY
