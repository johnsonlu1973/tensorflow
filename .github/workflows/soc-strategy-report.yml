name: "SOC Strategy: Bi-Daily Strategy Report"
on:
  # schedule:  # PAUSED
  #   - cron: '0 8 */2 * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: read

env:
  BRANCH_NAME: master
  PAGES_BASE: https://johnsonlu1973.github.io/tensorflow/soc-agent

jobs:
  strategy-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: soc-agent/agent/requirements.txt

      - name: Install dependencies
        run: pip install -r soc-agent/agent/requirements.txt

      - name: Generate Strategy Report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REPORT_BASE_URL: ${{ env.PAGES_BASE }}/reports
          PYTHONUNBUFFERED: "1"
        run: cd soc-agent && python agent/main.py --task strategy

      - name: Commit and push
        run: |
          git config user.name "SOC Strategy Agent"
          git config user.email "soc-agent@users.noreply.github.com"
          git add docs/soc-agent/reports/strategy/ || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "feat(reports): strategy recommendations $(date -u +'%Y-%m-%d')"
          for attempt in 1 2 3; do
            git pull --rebase origin ${{ env.BRANCH_NAME }} && git push origin ${{ env.BRANCH_NAME }} && break
            echo "Push attempt $attempt failed, retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
