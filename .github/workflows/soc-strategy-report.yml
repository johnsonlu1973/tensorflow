name: "SOC Strategy: Bi-Daily Strategy Report"
on:
  schedule:
    - cron: '0 8 */2 * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: read

env:
  BRANCH_NAME: claude/soc-strategy-agent-TBegn

jobs:
  strategy-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: soc-agent/agent/requirements.txt

      - name: Install dependencies
        run: pip install -r soc-agent/agent/requirements.txt

      - name: Generate Strategy Report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REPORT_BASE_URL: https://htmlpreview.github.io/?https://raw.githubusercontent.com/${{ github.repository }}/${{ env.BRANCH_NAME }}/soc-agent/reports
        run: cd soc-agent && python agent/main.py --task strategy

      - name: Commit and push
        run: |
          git config user.name "SOC Strategy Agent"
          git config user.email "soc-agent@users.noreply.github.com"
          git pull --rebase --autostash origin ${{ env.BRANCH_NAME }}
          git add soc-agent/reports/ soc-agent/skills/ || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "feat(reports): strategy recommendations $(date -u +'%Y-%m-%d')"
          git push origin ${{ env.BRANCH_NAME }}
