name: "SOC Strategy: Agent 1 Intel Collector"
on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 1 * * *'   # 每天 UTC 01:00（台北時間 09:00）

permissions:
  contents: write

env:
  BRANCH_NAME: claude/soc-strategy-agent-design-dLKiX

jobs:
  intel-collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: soc_strategy_agent/requirements.txt

      - name: Install dependencies
        run: pip install -r soc_strategy_agent/requirements.txt

      - name: Run Agent 1 Intel Collector
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: cd soc_strategy_agent && python run.py

      - name: Commit and push intel output
        run: |
          git config user.name "SOC Strategy Agent"
          git config user.email "soc-agent@users.noreply.github.com"
          git add soc_strategy_agent/sessions/ \
                  soc_strategy_agent/latest_intel_output.json \
                  soc_strategy_agent/latest_intel_report.md || true
          git diff --staged --quiet && echo "No new intel to commit" && exit 0
          git commit -m "intel: daily collect $(date -u +'%Y-%m-%d %H:%M UTC')"
          for attempt in 1 2 3 4; do
            git pull --rebase origin ${{ env.BRANCH_NAME }} && \
              git push origin ${{ env.BRANCH_NAME }} && break
            echo "Push attempt $attempt failed, retrying in $((attempt * 2))s..."
            sleep $((attempt * 2))
          done
