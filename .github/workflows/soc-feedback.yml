name: "SOC Strategy: Learn from GitHub Issues"
on:
  issues:
    types: [opened, edited, labeled, closed]
  workflow_dispatch:

permissions:
  contents: write
  issues: read

env:
  BRANCH_NAME: master

jobs:
  learn-feedback:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: soc-agent/agent/requirements.txt

      - name: Install dependencies
        run: pip install -r soc-agent/agent/requirements.txt

      - name: Process feedback
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PYTHONUNBUFFERED: "1"
        run: cd soc-agent && python agent/main.py --task feedback

      - name: Commit and push skills
        run: |
          git config user.name "SOC Strategy Agent"
          git config user.email "soc-agent@users.noreply.github.com"
          git add soc-agent/skills/learned_skills.json || true
          git diff --staged --quiet && echo "No new skills learned" && exit 0
          git commit -m "learn(skills): update from GitHub issue #${{ github.event.issue.number }}"
          for attempt in 1 2 3; do
            git pull --rebase origin ${{ env.BRANCH_NAME }} && git push origin ${{ env.BRANCH_NAME }} && break
            echo "Push attempt $attempt failed, retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
