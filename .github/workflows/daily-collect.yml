name: SOC Planning — Daily RSS Collection

on:
  schedule:
    # ── 台灣時間 06:00 每日執行 (UTC 22:00 前一天) ──
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      force_all_categories:
        description: 'Force collect all categories (ignore date filter)'
        required: false
        default: 'false'

jobs:
  # ────────────────────────────────────────────────
  # Job 1: RSS 收集 (台灣 06:00)
  # ────────────────────────────────────────────────
  collect:
    name: Fetch RSS & Summarize
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: soc_planning_agent/requirements.txt

      - name: Install dependencies
        run: pip install anthropic>=0.40.0

      - name: Run RSS collection & Claude summarization
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd $GITHUB_WORKSPACE
          python soc_planning_agent/github_collector.py

      - name: Check if new data was produced
        id: check_data
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          FILE="soc_planning_agent/data/${TODAY}.json"
          if [ -f "$FILE" ]; then
            COUNT=$(python3 -c "import json; d=json.load(open('$FILE')); print(d.get('total_articles',0))")
            TREND=$(python3 -c "import json; d=json.load(open('$FILE')); print(sum(c.get('trend_count',0) for c in d.get('collections',[])))")
            echo "file_exists=true"    >> $GITHUB_OUTPUT
            echo "article_count=$COUNT" >> $GITHUB_OUTPUT
            echo "trend_count=$TREND"  >> $GITHUB_OUTPUT
            echo "today=$TODAY"        >> $GITHUB_OUTPUT
          else
            echo "file_exists=false"  >> $GITHUB_OUTPUT
          fi

      - name: Commit JSON data
        if: steps.check_data.outputs.file_exists == 'true'
        run: |
          git config user.name  "SOC Planning Agent"
          git config user.email "soc-agent@github-actions[bot]"
          git add soc_planning_agent/data/
          git diff --staged --quiet || git commit -m \
            "collect: daily RSS digest ${{ steps.check_data.outputs.today }} (${{ steps.check_data.outputs.article_count }} articles)"
          git push

      - name: Summary
        run: |
          echo "### Collection Result" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_data.outputs.file_exists }}" == "true" ]; then
            echo "✅ **Articles:** ${{ steps.check_data.outputs.article_count }} (${{ steps.check_data.outputs.trend_count }} trend)" >> $GITHUB_STEP_SUMMARY
            echo "📅 **Date:** ${{ steps.check_data.outputs.today }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No data file produced." >> $GITHUB_STEP_SUMMARY
          fi

  # ────────────────────────────────────────────────
  # Job 2: HTML 更新 + Slack 通知 (台灣 06:30)
  # ────────────────────────────────────────────────
  publish:
    name: Generate HTML & Notify Slack
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: collect

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate HTML reports
        id: gen_html
        run: |
          cd $GITHUB_WORKSPACE
          python soc_planning_agent/generate_html.py

      - name: Commit HTML to docs/
        run: |
          git config user.name  "SOC Planning Agent"
          git config user.email "soc-agent@github-actions[bot]"
          git add docs/
          git diff --staged --quiet || git commit -m \
            "publish: HTML reports ${{ steps.gen_html.outputs.date }} (${{ steps.gen_html.outputs.new_reports }} reports, ${{ steps.gen_html.outputs.trend_total }} trend)"
          git push

      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          DATE="${{ steps.gen_html.outputs.date }}"
          REPORTS="${{ steps.gen_html.outputs.new_reports }}"
          TREND="${{ steps.gen_html.outputs.trend_total }}"
          URL="${{ steps.gen_html.outputs.pages_url }}"

          # Taiwan time label (UTC+8)
          TW_TIME=$(TZ=Asia/Taipei date +"%Y-%m-%d %H:%M")

          PAYLOAD=$(cat <<EOF
          {
            "blocks": [
              {
                "type": "header",
                "text": { "type": "plain_text", "text": "📊 SOC Planning Agent — 每日市場情報", "emoji": true }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*📅 日期*\n${TW_TIME} (台灣時間)" },
                  { "type": "mrkdwn", "text": "*📁 新增報告*\n${REPORTS} 份" },
                  { "type": "mrkdwn", "text": "*🔥 趨勢文章*\n${TREND} 篇深度分析完成" },
                  { "type": "mrkdwn", "text": "*🔗 查看報告*\n<${URL}|GitHub Pages>" }
                ]
              },
              {
                "type": "divider"
              },
              {
                "type": "context",
                "elements": [
                  { "type": "mrkdwn", "text": "SOC Planning Agent · GitHub Actions · <${URL}|開啟 Dashboard>" }
                ]
              }
            ]
          }
          EOF
          )

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Summary
        run: |
          echo "### Publish Result" >> $GITHUB_STEP_SUMMARY
          echo "📄 **Reports generated:** ${{ steps.gen_html.outputs.new_reports }}" >> $GITHUB_STEP_SUMMARY
          echo "🔥 **Trend articles:** ${{ steps.gen_html.outputs.trend_total }}" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Pages URL:** ${{ steps.gen_html.outputs.pages_url }}" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────
  # 週一台灣時間 06:00 — 3GPP 專項收集
  # (UTC Sunday 22:00 = Taiwan Monday 06:00)
  # ────────────────────────────────────────────────
  collect-3gpp:
    name: Weekly 3GPP Collection
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run on Sunday UTC (= Monday Taiwan time)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 22 * * *') &&
       toJSON(github.event) != '' )
    # Simpler: just check day of week in the run step

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if Monday (Taiwan time)
        id: day_check
        run: |
          TW_DAY=$(TZ=Asia/Taipei date +%u)   # 1=Mon … 7=Sun
          echo "tw_day=$TW_DAY" >> $GITHUB_OUTPUT
          if [ "$TW_DAY" = "1" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_3gpp=true" >> $GITHUB_OUTPUT
          else
            echo "run_3gpp=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-python@v5
        if: steps.day_check.outputs.run_3gpp == 'true'
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.day_check.outputs.run_3gpp == 'true'
        run: pip install anthropic>=0.40.0

      - name: Run 3GPP collection
        if: steps.day_check.outputs.run_3gpp == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd $GITHUB_WORKSPACE
          python -c "
          import sys; sys.path.insert(0,'soc_planning_agent')
          from rss_collector import RSSCollector
          import json, os
          from pathlib import Path
          from datetime import datetime, timezone
          collector = RSSCollector(max_age_days=7)
          results = collector.collect_3gpp_vendors()
          total = sum(len(a) for a in results.values())
          today = datetime.now(timezone.utc).strftime('%Y-%m-%d')
          out = Path('soc_planning_agent/data') / f'3gpp-{today}.json'
          out.parent.mkdir(exist_ok=True)
          out.write_text(json.dumps({'date': today, 'type': '3gpp_weekly',
            'total_articles': total,
            'collections': [{'category': cat, 'articles': arts} for cat, arts in results.items()]},
            ensure_ascii=False, indent=2))
          print(f'3GPP: {total} articles -> {out}')
          "

      - name: Commit 3GPP results
        if: steps.day_check.outputs.run_3gpp == 'true'
        run: |
          git config user.name  "SOC Planning Agent"
          git config user.email "soc-agent@github-actions[bot]"
          git add soc_planning_agent/data/
          git diff --staged --quiet || git commit -m "collect: weekly 3GPP digest $(date -u +%Y-%m-%d)"
          git push
